<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@LaClaraTV - Sala de Control</title>
    <style>
        body { margin: 0; padding: 20px; background: #1a0e00; color: #fff; font-family: 'Segoe UI', sans-serif; }
        h1 { text-align: center; color: #ff9d00; margin-bottom: 10px; font-size: 1.5rem; }
        .panel-github { background: rgba(0, 255, 65, 0.08); border: 1px solid rgba(0, 255, 65, 0.4); border-radius: 12px; padding: 15px; max-width: 800px; margin: 0 auto 20px auto; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .panel-github input { padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 255, 65, 0.5); border-radius: 6px; color: #fff; outline: none; font-size: 13px; }
        .panel-github input[type="password"] { width: 250px; }
        .panel-github input[type="text"] { width: 150px; }
        .panel-rapido { background: rgba(255, 157, 0, 0.08); border: 1px solid rgba(255, 157, 0, 0.4); border-radius: 12px; padding: 15px; max-width: 800px; margin: 0 auto 20px auto; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .panel-rapido input[type="text"] { flex: 1; min-width: 200px; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255, 157, 0, 0.5); border-radius: 6px; color: #fff; outline: none; }
        .panel-rapido select { padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255, 157, 0, 0.5); border-radius: 6px; color: #fff; cursor: pointer; outline: none; }
        .btn-agregar { padding: 10px 20px; background: #00ff41; color: #000; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }
        .contenedor-categorias { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .categoria { background: rgba(255, 255, 255, 0.05); border: 2px dashed rgba(255, 157, 0, 0.5); border-radius: 12px; padding: 10px; width: 180px; min-height: 200px; display: flex; flex-direction: column; }
        .categoria h2 { margin: 0 0 10px 0; font-size: 14px; text-align: center; color: #ff9d00; text-transform: uppercase; }
        .zona-drop { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .video-card { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 157, 0, 0.3); border-radius: 8px; padding: 8px; font-size: 12px; position: relative; }
        .video-card strong { display: block; color: #fff; margin-bottom: 4px; }
        .video-card small { color: #aaa; display: block; margin-bottom: 2px; word-break: break-all; }
        .btn-eliminar { position: absolute; top: 4px; right: 4px; background: rgba(255, 0, 0, 0.2); border: none; color: #ff6b6b; border-radius: 4px; cursor: pointer; font-size: 11px; padding: 2px 5px; }
        .btn-guardar { display: block; margin: 30px auto; padding: 12px 30px; background: #00ff41; color: #000; font-weight: bold; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
        .mensaje { text-align: center; padding: 10px; margin: 10px auto; max-width: 600px; border-radius: 6px; display: none; background: rgba(255, 157, 0, 0.2); border: 1px solid #ff9d00; color: #ff9d00; }
    </style>
</head>
<body>
    <h1>📺 @LaClaraTV - Sala de Control (Modo Diagnóstico)</h1>
    
    <div class="panel-github">
        <input type="text" id="github-user" value="Aldosuarez10">
        <input type="text" id="github-repo" value="laclara-tv">
        <input type="password" id="github-token" placeholder="Pega tu Token (ghp_...)">
    </div>

    <div class="panel-rapido">
        <input type="text" id="input-rapido" placeholder="ID o Link de Archive.org...">
        <select id="select-categoria">
            <option value="ciencia">🧪 CIENCIA</option>
            <option value="espiritualidad">🕉️ ESPIRITUALIDAD</option>
            <option value="misterio">🔍 MISTERIO</option>
            <option value="historia">📜 HISTORIA</option>
            <option value="bumper">📺 BUMPERS</option>
        </select>
        <button class="btn-agregar" onclick="agregarManual()">➕ AGREGAR</button>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <div class="contenedor-categorias">
        <div class="categoria" data-categoria="ciencia"><h2>🧪 CIENCIA</h2><div class="zona-drop"></div></div>
        <div class="categoria" data-categoria="espiritualidad"><h2>🕉️ ESPIRITUALIDAD</h2><div class="zona-drop"></div></div>
        <div class="categoria" data-categoria="misterio"><h2>🔍 MISTERIO</h2><div class="zona-drop"></div></div>
        <div class="categoria" data-categoria="historia"><h2>📜 HISTORIA</h2><div class="zona-drop"></div></div>
        <div class="categoria" data-categoria="bumper"><h2>📺 BUMPERS</h2><div class="zona-drop"></div></div>
    </div>

    <button class="btn-guardar" onclick="actualizarGitHub()">🚀 ACTUALIZAR SEÑAL EN GITHUB</button>

    <script>
        function mostrarMensaje(texto) {
            const msg = document.getElementById('mensaje');
            msg.textContent = texto;
            msg.style.display = 'block';
        }

        function agregarManual() {
            const input = document.getElementById('input-rapido');
            const select = document.getElementById('select-categoria');
            const texto = input.value.trim();
            if (!texto) { alert('⚠️ Escribe algo primero'); return; }
            
            const id = texto.includes('archive.org/details/') ? texto.split('archive.org/details/')[1].split('/')[0].split('?')[0] : texto;
            const zonaDrop = document.querySelector(`.categoria[data-categoria="${select.value}"] .zona-drop`);
            
            const card = document.createElement('div');
            card.className = 'video-card';
            card.dataset.id = id;
            card.dataset.titulo = id; // Por defecto
            card.dataset.categoria = select.value;
            card.dataset.duracion = '';
            card.innerHTML = `
                <button class="btn-eliminar" onclick="this.parentElement.remove()">✕</button>
                <input type="text" style="width:100%; background:#000; color:#fff; border:1px solid #0f0; margin-bottom:5px;" value="${id}" onchange="this.parentElement.dataset.titulo = this.value">
                <small>ID: <code>${id}</code></small>
            `;
            zonaDrop.appendChild(card);
            input.value = '';
            mostrarMensaje('✅ Agregado. (Si Archive.org no cargó el título, puedes escribirlo en la cajita negra de la tarjeta).');
        }

        async function actualizarGitHub() {
            alert("PASO 1: Iniciando función...");
            
            const user = document.getElementById('github-user').value.trim();
            const repo = document.getElementById('github-repo').value.trim();
            const token = document.getElementById('github-token').value.trim();

            if (!token) { alert("⚠️ FALTA EL TOKEN"); return; }
            alert(`PASO 2: Datos OK. Usuario: ${user}, Repo: ${repo}`);

            const playlist = [];
            document.querySelectorAll('.video-card').forEach(card => {
                playlist.push({
                    id: card.dataset.id,
                    titulo: card.dataset.titulo,
                    bloque: card.dataset.categoria,
                    tipo: "archive",
                    duracion: null,
                    peso: card.dataset.categoria === 'bumper' ? 12 : 9
                });
            });

            if (playlist.length === 0) { alert("⚠️ NO HAY VIDEOS EN LAS CATEGORÍAS"); return; }
            alert(`PASO 3: ${playlist.length} videos listos. Intentando conectar con GitHub...`);

            try {
                // 1. Buscar si existe para obtener el SHA
                mostrarMensaje('Consultando GitHub...');
                const getRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/playlist.json`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                alert(`PASO 4: Respuesta de GitHub: ${getRes.status} ${getRes.statusText}`);

                let sha = null;
                if (getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                } else if (getRes.status === 404) {
                    alert("⚠️ El archivo playlist.json NO EXISTE en GitHub. Debes crearlo manualmente primero (ver Plan B abajo).");
                    return;
                } else {
                    const err = await getRes.json();
                    alert(`❌ ERROR DE GITHUB: ${err.message}`);
                    return;
                }

                // 2. Enviar la actualización
                mostrarMensaje('Enviando datos...');
                const putBody = {
                    message: 'Actualización desde Sala de Control',
                    content: btoa(JSON.stringify(playlist, null, 2)),
                    branch: 'main'
                };
                if (sha) putBody.sha = sha;

                const putRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/playlist.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(putBody)
                });

                if (putRes.ok) {
                    alert("🎉 ¡ÉXITO TOTAL! La señal se actualizó en GitHub.");
                    mostrarMensaje('✅ ¡SEÑAL ACTUALIZADA CON ÉXITO!');
                } else {
                    const err = await putRes.json();
                    alert(`❌ FALLÓ LA ACTUALIZACIÓN: ${err.message}`);
                }
            } catch (error) {
                alert(`❌ ERROR DE RED O CORS: ${error.message}\n\nRevisa la consola (F12) para más detalles.`);
                console.error(error);
            }
        }
    </script>
</body>
</html>
