<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>@LaClaraTV - Señal Oficial</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>">
    
    <style>
        :root { --accent: #ff9d00; --glow: rgba(255, 157, 0, 0.3); --menu-bg: rgba(119, 214, 255, 0.25); --menu-text: #001a33; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #4a2800 0%, #1a0e00 100%); overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #escenario { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }

        #marco-tv {
            width: min(1000px, 92vw); aspect-ratio: 16/9; background: #000; border: 18px solid #0a0a0a; border-radius: 8px;
            box-shadow: 0 0 60px rgba(255, 157, 0, 0.4), 0 0 100px rgba(255, 157, 0, 0.2), 0 30px 60px rgba(0,0,0,0.95), inset 0 0 0 1px rgba(255,255,255,0.05);
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; z-index: 5;
        }
        #marco-tv::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05) 0%, transparent 40%);
            pointer-events: none; z-index: 1;
        }

        #logo-estacion {
            position: absolute; top: 25px; right: 35px; font-weight: 700; font-size: 20px; letter-spacing: 1px;
            background: linear-gradient(120deg, #ff0080 0%, #ff8c00 25%, #40e0d0 50%, #ff0080 75%, #ff8c00 100%);
            background-size: 200% 200%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            animation: tornasol 8s ease-in-out infinite; z-index: 10;
        }
        @keyframes tornasol { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        #en-vivo {
            position: absolute; top: 25px; left: 35px; z-index: 10; display: none; align-items: center; gap: 8px;
            color: #fff; font-weight: bold; font-size: 14px; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        .punto-rojo { width: 10px; height: 10px; background: #f00; border-radius: 50%; box-shadow: 0 0 8px #f00; animation: parpadeo 1.5s infinite; }
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #sintonia { text-align: center; color: var(--accent); z-index: 5; text-shadow: 0 0 15px var(--glow); transition: 0.5s; }
        .flash-sintonia { position: absolute; inset: 0; background: rgba(255,255,255,0.8); z-index: 15; pointer-events: none; animation: flash 0.4s ease-out; }
        @keyframes flash { 0% { opacity: 0.8; } 100% { opacity: 0; } }

        #osd-menu {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            transform-origin: bottom center;
            width: 280px;
            height: 0;
            background: var(--menu-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(119, 214, 255, 0.4);
            border-radius: 20px;
            padding: 0 30px;
            z-index: 25;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            overflow: hidden;
        }
        #osd-menu.activo {
            height: 280px;
            padding: 20px 30px;
            opacity: 1;
            transform: translateX(-50%) scaleY(1);
        }
        
        .osd-opcion {
            background: rgba(255, 255, 255, 0.3);
            color: var(--menu-text);
            font-weight: 800;
            font-size: 16px;
            padding: 10px 30px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(0, 26, 51, 0.1);
            transition: 0.2s;
            user-select: none;
            letter-spacing: 1px;
        }
        .osd-opcion:hover, .osd-opcion:active {
            background: rgba(119, 214, 255, 0.6);
            transform: scale(1.05);
        }

        #cntrl-box {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            perspective: 800px;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #cntrl-box.retirado { 
            transform: translate(250px, 150px) scale(0.6) rotateX(20deg);
            opacity: 0.7;
        }
        #cntrl-box.retirado:hover {
            opacity: 1;
            transform: translate(250px, 150px) scale(0.65) rotateX(20deg);
        }

        #control {
            width: 140px;
            height: 180px;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            border-radius: 20px;
            border: 1px solid #2a2a2a;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
            position: relative;
            transform: rotateX(35deg);
            box-shadow: 0 25px 50px rgba(0,0,0,0.9), inset 0 2px 4px rgba(255,255,255,0.1), inset 0 -2px 4px rgba(0,0,0,0.8);
            transition: 0.2s;
        }
        #control::before {
            content: '';
            position: absolute;
            top: 5%;
            left: 15%;
            right: 15%;
            height: 25%;
            background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 100%);
            border-radius: 15px 15px 0 0;
            pointer-events: none;
        }
        #control:active {
            transform: rotateX(40deg) translateY(3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.95);
        }

        .btn-remoto {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 10px 0;
            background: radial-gradient(circle at 30% 30%, #2a2a2a 0%, #0a0a0a 100%);
            border: 2px solid #3a3a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,255,255,0.1);
            font-weight: bold;
            font-size: 12px;
            transition: 0.1s;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
        }
        .btn-remoto:active {
            transform: scale(0.95);
            background: #0a0a0a;
        }
        
        #btn-power {
            border-color: #4a4a4a;
            margin-top: 15px;
            color: #888;
            font-size: 10px;
        }
        #btn-power::before {
            content: '';
            width: 20px;
            height: 20px;
            border: 3px solid #888;
            border-top: none;
            border-radius: 50%;
            position: absolute;
        }
        #btn-power::after {
            content: '';
            width: 3px;
            height: 12px;
            background: #888;
            position: absolute;
            top: 12px;
        }

        #btn-menu {
            border-color: #3a3a3a;
            opacity: 0.3;
            pointer-events: none;
            color: #555;
            font-size: 11px;
        }
        .tv-on #btn-menu {
            opacity: 1;
            pointer-events: all;
            border-color: #00ff41;
            color: #00ff41;
            text-shadow: 0 0 8px #00ff41;
        }

        #luz {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #300;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .encendido #luz {
            background: #f00;
            box-shadow: 0 0 12px #f00, inset 0 1px 2px rgba(255,255,255,0.3);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .pantalla {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            background: #000;
            display: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: scale(1.12);
        }
        @media (max-width: 768px) {
            iframe { transform: scale(1.05); }
            #cntrl-box.retirado {
                transform: translate(0, 120px) scale(0.7);
                bottom: 5%;
            }
        }
    </style>
</head>
<body>
    <div id="escenario">
        <div id="marco-tv">
            <div id="en-vivo"><div class="punto-rojo"></div> EN VIVO</div>
            <div id="logo-estacion">@LaClaraTV</div>
            <div id="sintonia">
                <h1 style="font-size: 32px; margin: 0;">SEÑAL EN ESPERA</h1>
                <p style="opacity: 0.6; font-size: 14px;">PRESIONA EL CONTROL</p>
            </div>
            <div class="pantalla" id="pantalla-video">
                <iframe id="video-frame" src="" allow="autoplay; fullscreen"></iframe>
            </div>
        </div>
        
        <div id="cntrl-box">
            <div id="osd-menu">
                <div class="osd-opcion" onclick="cambiarCanal('video')">CH 1</div>
                <div class="osd-opcion" onclick="cambiarCanal('video')">CH 2</div>
                <div class="osd-opcion" onclick="cambiarCanal('video')">CH 3</div>
                <div class="osd-opcion" onclick="cambiarCanal('viernes')">VIERNES MÍSTICOS</div>
                <div class="osd-opcion" onclick="cambiarCanal('universo')">UNIVERSO 2º ANILLO</div>
            </div>
            
            <div id="control">
                <div id="luz"></div>
                <div class="btn-remoto" id="btn-power" onclick="prenderTV(event)" title="Encender"></div>
                <div class="btn-remoto" id="btn-menu" onclick="abrirMenu(event)" title="Menú de Canales">MENU</div>
            </div>
        </div>
    </div>

    <script>
        const playlistBase = [
            { id: 'bamper-central-1' },
            { id: 'antartida-la-tierra-prohibida-aportes-la-claraboya' }
        ];

        const canalesExternos = {
            viernes: 'https://aldosuarez10.github.io/viernes-misticos-radio/',
            universo: 'https://aldosuarez10.github.io/universo_segundo_anillo/'
        };

        let playlist = [];
        let indiceActual = 0;
        let tvEncendida = false;

        function mezclar(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function prepararPlaylist() {
            playlist = mezclar([...playlistBase]);
            indiceActual = 0;
        }

        function cargarVideo() {
            const item = playlist[indiceActual];
            const frame = document.getElementById('video-frame');
            
            const flash = document.createElement('div');
            flash.className = 'flash-sintonia';
            document.getElementById('marco-tv').appendChild(flash);
            setTimeout(() => flash.remove(), 400);

            frame.src = `https://archive.org/embed/${item.id}?autoplay=1`;
            
            indiceActual++;
            if (indiceActual >= playlist.length) {
                prepararPlaylist();
            }
        }

        function cargarCanalExterno(canal) {
            const frame = document.getElementById('video-frame');
            
            const flash = document.createElement('div');
            flash.className = 'flash-sintonia';
            document.getElementById('marco-tv').appendChild(flash);
            setTimeout(() => flash.remove(), 400);

            frame.src = canalesExternos[canal];
        }

        function prenderTV(e) {
            if(e) e.stopPropagation();
            if (tvEncendida) return;
            tvEncendida = true;
            
            document.getElementById('cntrl-box').classList.add('retirado');
            document.getElementById('cntrl-box').classList.add('encendido');
            document.getElementById('control').classList.add('tv-on');
            document.getElementById('en-vivo').style.display = 'flex';
            
            prepararPlaylist();
            
            setTimeout(() => {
                document.getElementById('sintonia').style.display = 'none';
                document.getElementById('pantalla-video').style.display = 'block';
                cargarVideo();
            }, 500);
        }

        function abrirMenu(e) {
            if(e) e.stopPropagation();
            if (!tvEncendida) return;
            const menu = document.getElementById('osd-menu');
            menu.classList.toggle('activo');
        }

        function cambiarCanal(tipo) {
            if (!tvEncendida) return;
            document.getElementById('osd-menu').classList.remove('activo');
            
            setTimeout(() => {
                if (tipo === 'video') {
                    cargarVideo();
                } else if (tipo === 'viernes' || tipo === 'universo') {
                    cargarCanalExterno(tipo);
                }
            }, 300);
        }

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('osd-menu');
            const btnMenu = document.getElementById('btn-menu');
            if (menu.classList.contains('activo') && !menu.contains(e.target) && e.target !== btnMenu) {
                menu.classList.remove('activo');
            }
        });
    </script>
</body>
</html>
