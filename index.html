<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>@LaClaraTV - Señal Oficial</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%93%BA</text></svg>">

    <style>
        :root { --accent: #ff9d00; --glow: rgba(255, 157, 0, 0.3); --menu-bg: rgba(0, 0, 0, 0.85); --menu-text: #fff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #2c1a04 0%, #0c0700 100%); overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #escenario { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }

        /* MARCO DE LA TELE */
        #marco-tv {
            width: min(1000px, 92vw); aspect-ratio: 16/9; background: #000; border: 18px solid #0a0a0a; border-radius: 8px;
            box-shadow: 0 0 60px rgba(255, 157, 0, 0.3), 0 30px 60px rgba(0,0,0,0.95);
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; z-index: 5;
        }

        #logo-estacion {
            position: absolute; top: 25px; right: 35px; font-weight: 700; font-size: 20px; letter-spacing: 1px;
            color: var(--accent); z-index: 10; user-select: none; opacity: 0.6; text-shadow: 0 2px 4px #000;
        }

        #en-vivo {
            position: absolute; top: 25px; left: 35px; z-index: 10; display: none; align-items: center; gap: 8px;
            color: #fff; font-weight: bold; font-size: 14px; text-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        .punto-rojo { width: 10px; height: 10px; background: #f00; border-radius: 50%; box-shadow: 0 0 8px #f00; animation: parpadeo 1.5s infinite; }
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #osd-titulo {
            position: absolute; bottom: 40px; left: 35px; z-index: 15;
            background: rgba(0,0,0,0.85); color: #fff; padding: 10px 18px;
            border-left: 4px solid var(--accent); border-radius: 0 6px 6px 0;
            font-size: 15px; font-weight: 600; opacity: 0; transform: translateX(-20px);
            transition: all 0.4s ease-out; pointer-events: none;
        }
        #osd-titulo.visible { opacity: 1; transform: translateX(0); }

        /* PANTALLA DE ESPERA */
        #sintonia { text-align: center; color: var(--accent); z-index: 5; text-shadow: 0 0 15px var(--glow); }

        /* MENÚ OSD */
        #osd-menu {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) scaleY(0);
            transform-origin: bottom center; width: 280px; background: var(--menu-bg);
            border: 1px solid rgba(255, 157, 0, 0.3); border-radius: 15px; padding: 0; z-index: 25; 
            display: flex; flex-direction: column; justify-content: center; gap: 8px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8); opacity: 0; transition: all 0.3s ease;
        }
        #osd-menu.activo { padding: 15px; opacity: 1; transform: translateX(-50%) scaleY(1); }

        .osd-opcion {
            background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 14px;
            padding: 10px; border-radius: 6px; text-align: center; cursor: pointer;
            transition: 0.2s; border: 1px solid rgba(255,255,255,0.05);
        }
        .osd-opcion:hover { background: var(--accent); color: #000; font-weight: bold; }

        /* CONTROL REMOTO */
        #cntrl-box { position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); z-index: 20; perspective: 800px; }
        #cntrl-box.retirado { transform: translate(250px, 150px) scale(0.65); opacity: 0.5; }
        #cntrl-box.retirado:hover { opacity: 1; }

        #control {
            width: 130px; height: 160px; background: linear-gradient(180deg, #222, #050505);
            border-radius: 18px; border: 1px solid #333; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: space-around; padding: 15px 0;
            transform: rotateX(30deg); box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .btn-remoto {
            width: 45px; height: 45px; border-radius: 50%;
            background: #111; border: 2px solid #333; display: flex; align-items: center;
            justify-content: center; color: #fff; font-weight: bold; font-size: 11px;
        }
        #btn-power { background: #500; border-color: #800; color: #ff8c00; }
        #btn-menu { opacity: 0.5; pointer-events: none; }
        .tv-on #btn-menu { opacity: 1; pointer-events: all; border-color: var(--accent); color: var(--accent); }

        #luz { position: absolute; top: 12px; right: 12px; width: 8px; height: 8px; border-radius: 50%; background: #300; }
        .encendido #luz { background: #f00; box-shadow: 0 0 10px #f00; }

        /* PANTALLA REPRODUCTOR */
        .pantalla { width: 100%; height: 100%; display: none; background: #000; }
        .video-layer { width: 100%; height: 100%; object-fit: contain; }
        .web-layer { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>
    <div id="escenario">
        <div id="marco-tv">
            <div id="en-vivo"><div class="punto-rojo"></div> EN VIVO</div>
            <div id="logo-estacion">@LaClaraTV</div>
            <div id="osd-titulo"></div>

            <div id="sintonia">
                <h1 style="font-size: 32px; margin: 0; letter-spacing: 2px;">@LaClaraTV</h1>
                <p style="opacity: 0.6; font-size: 14px;">PRESIONA ENCENDER EN EL CONTROL</p>
            </div>
            
            <div class="pantalla" id="pantalla-video">
                <video id="reproductor" class="video-layer" playsinline controls></video>
                <iframe id="web-frame" class="web-layer" allow="autoplay; fullscreen"></iframe>
            </div>
        </div>

        <div id="cntrl-box">
            <div id="osd-menu">
                <div class="osd-opcion" onclick="cambiarCanal('zapping')">📺 ZAPPING</div>
                <div class="osd-opcion" onclick="cambiarCanal('misterio')">🔍 MISTERIO</div>
                <div class="osd-opcion" onclick="cambiarCanal('historia')">📜 HISTORIA</div>
                <div class="osd-opcion" onclick="cambiarCanal('ciencia')">🧪 CIENCIA</div>
                <div class="osd-opcion" onclick="cambiarCanal('espiritualidad')">🕉️ ESPIRITUALIDAD</div>
                <div class="osd-opcion" onclick="cambiarCanal('viernes')">🔮 VIERNES MÍSTICOS</div>
                <div class="osd-opcion" onclick="cambiarCanal('universo')">🌀 UNIVERSO 2° ANILLO</div>
            </div>

            <div id="control">
                <div id="luz"></div>
                <div class="btn-remoto" id="btn-power" onclick="prenderTV()" title="Encender">ON</div>
                <div class="btn-remoto" id="btn-menu" onclick="abrirMenu(event)" title="Menú">MENU</div>
            </div>
        </div>
    </div>

    <script>
        // BIBLIOTECA RESPALDO (Directa, sin APIs raras)
        const bibliotecaDefault = [
            { id: "bamper-central-1", titulo: "Bumper Central 1", bloque: "bumper", tipo: "archive" },
            { id: "bamper-2", titulo: "Bumper Central 2", bloque: "bumper", tipo: "archive" },
            { id: "las-fallas-de-la-arqueologia", titulo: "Las Fallas De La Arqueologia", bloque: "ciencia", tipo: "archive" },
            { id: "astronomia-vieja-impostora", titulo: "Astronomia Vieja Impostora", bloque: "ciencia", tipo: "archive" },
            { id: "antartida-la-tierra-prohibida-aportes-la-claraboya", titulo: "Antartida La Tierra Prohibida", bloque: "ciencia", tipo: "archive" },
            { id: "la-rueda-de-samsara", titulo: "La Rueda de Samsara", bloque: "espiritualidad", tipo: "archive" },
            { id: "TheSecretLandHighJump194769min", titulo: "Operacion Highjump (Secret Land)", bloque: "misterio", tipo: "archive" },
            { id: "Pre-Columbian_Trans-Oceanic_Contact", titulo: "Contacto Transoceanico Precolombino", bloque: "historia", tipo: "archive" },
            { id: "viernes", titulo: "Viernes Misticos", bloque: "externo", url: "https://aldosuarez10.github.io/viernes-misticos-radio/", tipo: "web" },
            { id: "universo", titulo: "Universo 2 Anillo", bloque: "externo", url: "https://aldosuarez10.github.io/universo_segundo_anillo/", tipo: "web" }
        ];

        let biblioteca = [...bibliotecaDefault];
        let tvEncendida = false;
        let ultimoIdMostrado = null;
        let canalActual = 'zapping';

        // CARGAR PLAYLIST SI EXISTE
        async function cargarPlaylist() {
            try {
                const res = await fetch('playlist.json');
                if (res.ok) {
                    const data = await res.json();
                    const itemsJson = data.filter(item => item.id && item.bloque);
                    if (itemsJson.length > 0) {
                        // Unimos el default con el JSON para no perder nada
                        biblioteca = [...itemsJson, ...bibliotecaDefault.filter(d => !itemsJson.some(j => j.id === d.id))];
                        console.log("✅ Playlist unificada con éxito.");
                    }
                }
            } catch (e) {
                console.log("Usando biblioteca local.");
            }
        }

        function prenderTV() {
            if (tvEncendida) return;
            tvEncendida = true;

            document.getElementById('cntrl-box').classList.add('retirado', 'encendido');
            document.getElementById('control').classList.add('tv-on');
            document.getElementById('en-vivo').style.display = 'flex';
            document.getElementById('sintonia').style.display = 'none';
            document.getElementById('pantalla-video').style.display = 'block';
            
            cambiarCanal('zapping');
        }

        function abrirMenu(e) {
            e.stopPropagation();
            if (!tvEncendida) return;
            document.getElementById('osd-menu').classList.toggle('activo');
        }

        function cambiarCanal(bloque) {
            document.getElementById('osd-menu').classList.remove('activo');
            canalActual = bloque;

            if (bloque === 'viernes' || bloque === 'universo') {
                const ext = biblioteca.find(v => v.id === bloque);
                if (ext) mostrarEnPantalla(ext);
            } else {
                let candidatos = biblioteca.filter(v => v.tipo === "archive" && (bloque === 'zapping' ? true : v.bloque === bloque));
                if (candidatos.length === 0) candidatos = biblioteca.filter(v => v.bloque === 'bumper');
                
                const elegido = candidatos[Math.floor(Math.random() * candidatos.length)];
                mostrarEnPantalla(elegido);
            }
        }

        function mostrarEnPantalla(item) {
            ultimoIdMostrado = item.id;
            
            // OSD de Título
            const osd = document.getElementById('osd-titulo');
            osd.textContent = item.titulo;
            osd.classList.add('visible');
            setTimeout(() => osd.classList.remove('visible'), 5000);

            const reproductor = document.getElementById('reproductor');
            const webFrame = document.getElementById('web-frame');

            if (item.tipo === 'web') {
                reproductor.pause();
                reproductor.style.display = 'none';
                webFrame.style.display = 'block';
                webFrame.src = item.url;
            } else {
                webFrame.src = 'about:blank';
                webFrame.style.display = 'none';
                reproductor.style.display = 'block';
                
                // ARMA EL LINK DIRECTO (El viejo confiable)
                reproductor.src = `https://archive.org/download/${item.id}/${item.id}.mp4`;
                reproductor.play().catch(e => console.log("Click play manual requerido"));
            }
        }

        // AL TERMINAR UN VIDEO, PASAR AL SIGUIENTE AUTOMÁTICAMENTE
        document.getElementById('reproductor').addEventListener('ended', function() {
            if (!tvEncendida) return;
            cambiarCanal(canalActual);
        });

        // Cerrar menú al hacer clic afuera
        document.addEventListener('click', function (e) {
            const menu = document.getElementById('osd-menu');
            const btn = document.getElementById('btn-menu');
            if (menu.classList.contains('activo') && !menu.contains(e.target) && e.target !== btn) {
                menu.classList.remove('activo');
            }
        });

        cargarPlaylist();
    </script>
</body>
</html>
