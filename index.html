<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>@LaClaraTV - Señal Oficial</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%93%BA</text></svg>">
    <!-- Aquí llamamos al CSS separado -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="escenario">
        <div id="contenedor-tv">
            <div id="marco-tv">
                <div id="en-vivo"><div class="punto-rojo"></div> EN VIVO</div>
                
                <!-- AQUÍ VA TU LOGO PNG -->
                <img id="logo-estacion" src="logo.png" alt="LaClaraTV">
                
                <div id="contador-viewers">👁 <span id="viewer-count">14</span> en línea</div>
                <div id="reloj-en-vivo">00:00:00</div>
                <div id="osd-titulo"></div>
                <div id="osd-volumen">
                    <span>🔊</span>
                    <div id="barra-vol-contenedor">
                        <div id="barra-vol" style="width:100%;"></div>
                    </div>
                    <span id="txt-vol">100%</span>
                </div>
                <div id="estado-cargando"></div>

                <div id="sintonia">
				<div id="overlay-carga">
                <div class="texto-carga">SINTONIZANDO SEÑAL...</div>
                <div class="barra-contenedor">
                    <div class="barra-progreso"></div>
                </div>
            </div>
                    <h1>SEÑAL EN ESPERA</h1>
                    <p>PRESIONA EL CONTROL</p>
                </div>
                            <!-- Overlay de Carga -->
            <div id="overlay-carga">
                <div class="texto-carga">SINTONIZANDO SEÑAL...</div>
                <div class="barra-contenedor">
                    <div class="barra-progreso"></div>
                </div>
            </div>
                <div class="pantalla" id="pantalla-video">
                    <video id="video-layer-1" class="video-layer" playsinline></video>
                    <video id="video-layer-2" class="video-layer inactiva" playsinline></video>
                    <iframe id="web-frame" class="web-layer" style="display: none;" allow="autoplay; fullscreen"></iframe>
                </div>
            </div>

            <div id="cntrl-box">
                <div id="osd-menu">
                    <div id="menu-dinamico"></div>
                </div>

                <div id="control">
                    <div id="luz"></div>
                    <div class="btn-remoto" id="btn-power" onclick="toggleTV(event)"></div>
                    <div class="btn-remoto" id="btn-menu" onclick="abrirMenu(event)">MENU</div>
                    <div style="display:flex; gap:0.6vmin; margin-top:0.5vmin;">
                        <div class="btn-remoto btn-vol" onclick="cambiarVolumen(-0.1)">🔉</div>
                        <div class="btn-remoto btn-vol" onclick="cambiarVolumen(0.1)">🔊</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="pantalla-fuera-aire">
            <div style="font-size: 4rem; margin-bottom: 20px;"></div>
            <h1 style="color: #ff9d00; font-size: 2rem; margin: 0; font-weight: 700;">@LaClaraTV</h1>
            <p style="color: #fff; font-size: 1.3rem; margin: 20px 0; font-weight: 300;">Momentáneamente fuera de aire.</p>
            <p style="color: #ccc; font-size: 1rem; margin-bottom: 10px;">Dirígete a nuestro canal en vivo:</p>
            <a href="https://youtube.com/@laclara" target="_blank" style="background: #ff0000; color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.1rem; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s;">
                <span>▶</span> youtube.com/@laclara
            </a>
            <p style="color: #666; margin-top: 40px; font-size: 0.9rem;">¡Vuelve más tarde!</p>
        </div>
    </div>

    <!-- Aquí llamamos al JS separado -->
    <script src="script.js" defer></script>
</body>
</html>
